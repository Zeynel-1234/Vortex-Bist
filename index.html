<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>At Yarışı Analiz — Vortex</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap');

    :root {
      --gold: #f5a623;
      --red: #e74c3c;
      --green: #2ecc71;
      --blue: #3498db;
      --bg: #0a0a0f;
      --card: #111118;
      --border: #222230;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #e0e0e0;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0a0a 100%);
      border-bottom: 1px solid var(--gold);
      padding: 16px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 900px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 3px;
    }

    .logo span { color: #fff; }

    .status-badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid;
    }

    .status-badge.online { color: var(--green); border-color: var(--green); }
    .status-badge.offline { color: var(--red); border-color: var(--red); }

    /* Main */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      padding: 10px 18px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      min-width: 140px;
    }

    .btn:hover { background: var(--gold); color: #000; }
    .btn.primary { background: var(--gold); color: #000; font-weight: 600; }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: var(--red); color: #fff; }

    /* Race selector */
    .race-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin-bottom: 20px;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .race-tab {
      background: var(--card);
      border: 1px solid var(--border);
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .race-tab.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(245, 166, 35, 0.08);
    }

    /* Trinity cards */
    .trinity-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .trinity-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .trinity-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
    }

    .trinity-card.sovereign::before { background: var(--gold); }
    .trinity-card.breaker::before { background: var(--blue); }
    .trinity-card.ghost::before { background: #9b59b6; }

    .trinity-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .trinity-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
    }

    .sovereign .trinity-label { color: var(--gold); }
    .breaker .trinity-label { color: var(--blue); }
    .ghost .trinity-label { color: #9b59b6; }

    .horse-name {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin: 4px 0;
      letter-spacing: 1px;
    }

    .score-pill {
      text-align: right;
    }

    .score-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      line-height: 1;
    }

    .sovereign .score-big { color: var(--gold); }
    .breaker .score-big { color: var(--blue); }
    .ghost .score-big { color: #9b59b6; }

    .score-label { font-size: 10px; color: #666; }

    .probability-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px 0;
      overflow: hidden;
    }

    .probability-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s ease;
    }

    .sovereign .probability-fill { background: var(--gold); }
    .breaker .probability-fill { background: var(--blue); }
    .ghost .probability-fill { background: #9b59b6; }

    .flags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }

    .flag-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.05);
      color: #aaa;
      border: 1px solid var(--border);
    }

    .flag-badge.positive { color: var(--green); border-color: rgba(46,204,113,0.3); }
    .flag-badge.warning { color: var(--gold); border-color: rgba(245,166,35,0.3); }
    .flag-badge.ghost { color: #9b59b6; border-color: rgba(155,89,182,0.3); }

    /* Score breakdown */
    .breakdown {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .breakdown-item {
      text-align: center;
      background: rgba(255,255,255,0.03);
      border-radius: 4px;
      padding: 4px;
    }

    .breakdown-label { font-size: 9px; color: #555; }
    .breakdown-val { font-size: 13px; font-weight: 600; color: #ccc; }

    /* All horses table */
    .all-horses {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .all-horses h3 {
      padding: 12px 16px;
      font-size: 12px;
      letter-spacing: 2px;
      color: #666;
      border-bottom: 1px solid var(--border);
    }

    .horse-row {
      display: grid;
      grid-template-columns: 28px 1fr 50px 50px 50px;
      gap: 8px;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .horse-row:last-child { border-bottom: none; }
    .horse-row:hover { background: rgba(255,255,255,0.02); }

    .horse-no { color: #555; font-size: 12px; }
    .horse-row-name { font-size: 13px; color: #ddd; }
    .horse-score { font-size: 15px; font-weight: 600; text-align: right; }
    .horse-prob { font-size: 11px; color: #666; text-align: right; }
    .horse-tier { font-size: 10px; text-align: right; }

    .tier-s { color: var(--gold); }
    .tier-b { color: var(--blue); }
    .tier-g { color: #9b59b6; }
    .tier-i { color: #555; }

    /* Analysis text */
    .analysis-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.7;
      color: #aaa;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { color: #555; font-size: 13px; }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--gold);
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    .notification.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">AT<span>YARİŞI</span> ANALİZ</div>
    <div class="status-badge online" id="statusBadge">● ÇEVRIMIÇI</div>
  </div>
</header>

<main>
  <div class="btn-group">
    <button class="btn primary" onclick="autoScrape()">🔍 OTOMATİK ÇEK</button>
    <button class="btn" onclick="window.location='/bookmarklet'">📋 BOOKMARKLET</button>
    <button class="btn" onclick="loadResults()">🔄 YENİLE</button>
    <button class="btn danger" onclick="clearData()">🗑 TEMİZLE</button>
  </div>

  <div id="raceTabs" class="race-tabs" style="display:none"></div>

  <div id="content">
    <div class="empty">
      <div class="empty-icon">🏇</div>
      <div class="empty-text">Veri bekleniyor...<br><br>
        1. OTOMATİK ÇEK'e tıkla (TJK erişimi dene)<br>
        2. Veya BOOKMARKLET kur → TJK'yı aç → Çalıştır
      </div>
    </div>
  </div>
</main>

<div class="notification" id="notification"></div>

<script>
  let allResults = [];
  let currentRace = 0;

  async function autoScrape() {
    showLoading('TJK\'dan veri çekiliyor...');
    try {
      const r = await fetch('/api/scrape');
      const data = await r.json();
      if (data.success && data.results.length > 0) {
        allResults = data.results;
        renderRaceTabs();
        renderRace(0);
        notify('✅ ' + data.results.length + ' koşu analiz edildi');
      } else {
        showEmpty(data.message || 'TJK erişimi başarısız. Bookmarklet kullanın.');
      }
    } catch (e) {
      showEmpty('Sunucu hatası: ' + e.message);
    }
  }

  async function loadResults() {
    showLoading('Sonuçlar yükleniyor...');
    try {
      const r = await fetch('/api/results');
      const data = await r.json();
      if (data.results && data.results.length > 0) {
        allResults = data.results;
        renderRaceTabs();
        renderRace(0);
      } else {
        showEmpty('Henüz analiz yok. Bookmarklet kullanın veya Otomatik Çek\'e tıklayın.');
      }
    } catch (e) {
      showEmpty('Sunucu bağlantısı yok');
    }
  }

  function renderRaceTabs() {
    const tabs = document.getElementById('raceTabs');
    tabs.style.display = 'flex';
    tabs.innerHTML = allResults.map((r, i) => `
      <div class="race-tab ${i === currentRace ? 'active' : ''}" onclick="renderRace(${i})">
        ${r.raceNo}. KŞ<br><small>${r.track.slice(0,8)}</small>
      </div>
    `).join('');
  }

  function renderRace(idx) {
    currentRace = idx;
    document.querySelectorAll('.race-tab').forEach((t,i) => {
      t.classList.toggle('active', i === idx);
    });

    const r = allResults[idx];
    if (!r) return;

    const content = document.getElementById('content');
    content.innerHTML = `
      ${renderTrinityCard('sovereign', r.sovereign, '👑 SOVEREIGN')}
      ${renderTrinityCard('breaker', r.breaker, '⚔️ BREAKER')}
      ${renderTrinityCard('ghost', r.ghost, '👻 GHOST')}

      <div class="all-horses">
        <h3>TÜM ATLAR — ${r.raceNo}. KOŞU / ${r.track}</h3>
        ${r.allScores.map(s => `
          <div class="horse-row">
            <div class="horse-no">${s.horse.no}</div>
            <div class="horse-row-name">${s.horse.name}</div>
            <div class="horse-score tier-${s.tier[0].toLowerCase()}">${s.total}p</div>
            <div class="horse-prob">%${s.probability}</div>
            <div class="horse-tier tier-${s.tier[0].toLowerCase()}">${s.tier}</div>
          </div>
        `).join('')}
      </div>

      <div class="analysis-box">${r.analysis}</div>
    `;
  }

  function renderTrinityCard(cls, score, label) {
    const flags = score.flags.slice(0,4).map(f => {
      const isPositive = f.includes('BONUS') || f.includes('1.') || f.includes('ELİT') || f.includes('TAZE');
      const isGhost = f.includes('GHOST');
      const cls = isGhost ? 'ghost' : isPositive ? 'positive' : '';
      return `<span class="flag-badge ${cls}">${f.slice(0,35)}</span>`;
    }).join('');

    const bd = score.breakdown;
    const breakdownItems = [
      { l: 'SON6Y', v: bd.son6Y },
      { l: 'PİYASA', v: bd.piyasa },
      { l: 'JOKEY', v: bd.jokey },
      { l: 'KILO', v: bd.kilo },
      { l: 'KGS', v: bd.kgs },
      { l: 'İDMAN', v: bd.idman },
      { l: 'DS', v: bd.ds },
      { l: 'ANTRNR', v: bd.antrenor },
    ].map(i => `
      <div class="breakdown-item">
        <div class="breakdown-label">${i.l}</div>
        <div class="breakdown-val">${i.v}</div>
      </div>
    `).join('');

    return `
      <div class="trinity-card ${cls}">
        <div class="trinity-header">
          <div>
            <div class="trinity-label">${label}</div>
            <div class="horse-name">${score.horse.name}</div>
            <div style="font-size:11px;color:#666">No: ${score.horse.no} ${score.horse.jockeyName ? '| ' + score.horse.jockeyName : ''} ${score.horse.weight ? '| ' + score.horse.weight + 'kg' : ''}</div>
          </div>
          <div class="score-pill">
            <div class="score-big">${score.total}</div>
            <div class="score-label">PUAN</div>
            <div style="font-size:16px;color:#888">%${score.probability}</div>
          </div>
        </div>
        <div class="probability-bar">
          <div class="probability-fill" style="width:${score.probability}%"></div>
        </div>
        <div class="breakdown">${breakdownItems}</div>
        <div class="flags">${flags}</div>
      </div>
    `;
  }

  function showLoading(msg) {
    document.getElementById('content').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div>${msg}</div>
      </div>
    `;
  }

  function showEmpty(msg) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">${msg}</div>
      </div>
    `;
  }

  function clearData() {
    allResults = [];
    document.getElementById('raceTabs').style.display = 'none';
    showEmpty('Temizlendi.');
  }

  function notify(msg) {
    const el = document.getElementById('notification');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  // Sayfa açılınca mevcut sonuçları yükle
  loadResults();

  // Health check
  fetch('/health').then(r => r.json()).then(() => {
    document.getElementById('statusBadge').className = 'status-badge online';
    document.getElementById('statusBadge').textContent = '● ÇEVRIMIÇI';
  }).catch(() => {
    document.getElementById('statusBadge').className = 'status-badge offline';
    document.getElementById('statusBadge').textContent = '● BAĞLANTI YOK';
  });
</script>
</body>
</html>
