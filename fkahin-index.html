<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fraktal Kâhin · BIST DNA</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{
            font-family:'Courier New',monospace;
            background:#0b0e14;color:#e3e9f5;
            min-height:100dvh;padding:16px 12px;
        }
        .container{max-width:600px;margin:0 auto;}
        h1{font-size:1.8rem;font-weight:400;letter-spacing:2px;color:#a78bfa;margin-bottom:8px;}
        .sub{font-size:0.8rem;opacity:0.7;margin-bottom:20px;border-bottom:1px solid #2a2f3a;padding-bottom:12px;}
        .config-card{
            background:#151a22;border-radius:16px;padding:18px 16px;
            border:1px solid #2a3340;margin-bottom:24px;
        }
        label{display:block;font-size:0.75rem;opacity:0.8;margin-bottom:6px;letter-spacing:0.5px;}
        input{
            width:100%;background:#0b0e14;border:1px solid #2a3340;
            color:#fff;padding:14px 16px;border-radius:40px;font-size:1rem;
            font-family:inherit;margin-bottom:12px;
        }
        input:focus{outline:none;border-color:#a78bfa;}
        button{
            background:#a78bfa;border:none;color:#0b0e14;font-weight:bold;
            padding:14px 20px;border-radius:40px;font-size:1.1rem;width:100%;
            font-family:inherit;cursor:pointer;transition:0.2s;margin-top:8px;
            border:1px solid #c4b5fd;
        }
        button:active{background:#c4b5fd;}
        .status{font-size:0.8rem;margin:12px 0;color:#9ca3af;min-height:24px;}
        .result-card{
            background:#151a22;border-radius:20px;padding:20px 16px;
            border-left:6px solid #a78bfa;margin-top:16px;
        }
        .symbol-title{font-size:2rem;font-weight:600;color:#fff;margin-bottom:4px;}
        .dna-badge{
            background:#1e2430;padding:8px 12px;border-radius:40px;
            font-size:0.7rem;word-break:break-all;margin:12px 0;
            border:1px dashed #a78bfa;color:#c4b5fd;
        }
        .signal-row{
            display:flex;align-items:center;justify-content:space-between;
            margin:18px 0 12px;
        }
        .signal-badge{
            font-size:2.5rem;font-weight:800;letter-spacing:2px;
            padding:6px 18px;border-radius:60px;background:#1e2430;
        }
        .AL{color:#10b981;text-shadow:0 0 8px #10b98155;}
        .SAT{color:#f43f5e;text-shadow:0 0 8px #f43f5e55;}
        .strength{font-size:1.2rem;}
        .reasons{
            background:#0b0e14;border-radius:16px;padding:16px;
            margin-top:20px;font-size:0.8rem;line-height:1.5;
            border:1px solid #2a3340;
        }
        .footer{text-align:center;margin-top:30px;opacity:0.5;font-size:0.7rem;}
        .error{color:#f87171;}
        .loading{opacity:0.7;}
    </style>
</head>
<body>
<div class="container">
    <h1>FRAKTAL KÂHİN</h1>
    <div class="sub">BIST · Kuantum DNA Motoru v1.0</div>

    <div class="config-card">
        <label>🌐 Backend URL</label>
        <input type="text" id="backendUrl" placeholder="https://..." value="">
        <button id="saveUrlBtn">💾 KAYDET & BAĞLAN</button>
        <div id="urlStatus" class="status"></div>
    </div>

    <div style="display:flex;gap:8px;">
        <input type="text" id="symbolInput" placeholder="Hisse Kodu (örn: THYAO)" value="THYAO" autocomplete="off" autocapitalize="characters" style="text-transform:uppercase;">
        <button id="scanBtn" style="width:auto;padding:14px 24px;">🔍 TARA</button>
    </div>
    <div id="scanStatus" class="status"></div>

    <div id="resultArea" style="display:none;">
        <div class="result-card">
            <div class="symbol-title" id="symbolDisplay">----</div>
            <div class="dna-badge" id="dnaDisplay">DNA Kodu hesaplanıyor...</div>
            <div class="signal-row">
                <span style="opacity:0.7;">Sinyal</span>
                <span class="signal-badge" id="signalDisplay">--</span>
            </div>
            <div style="display:flex;justify-content:space-between;">
                <span>⚡ Güç Katsayısı</span>
                <span class="strength" id="strengthDisplay">--</span>
            </div>
            <div class="reasons" id="reasonsDisplay">Gerekçeler yükleniyor...</div>
        </div>
    </div>
    <div class="footer">© 2026 · Project Chimera Fractal</div>
</div>
<script>
(function(){
    const backendInput = document.getElementById('backendUrl');
    const saveBtn = document.getElementById('saveUrlBtn');
    const urlStatus = document.getElementById('urlStatus');
    const symbolInput = document.getElementById('symbolInput');
    const scanBtn = document.getElementById('scanBtn');
    const scanStatus = document.getElementById('scanStatus');
    const resultArea = document.getElementById('resultArea');
    const symbolDisplay = document.getElementById('symbolDisplay');
    const dnaDisplay = document.getElementById('dnaDisplay');
    const signalDisplay = document.getElementById('signalDisplay');
    const strengthDisplay = document.getElementById('strengthDisplay');
    const reasonsDisplay = document.getElementById('reasonsDisplay');

    let BACKEND_URL = localStorage.getItem('fkahin_backend_url') || '';

    function updateUrlStatus(msg, isOk){
        urlStatus.textContent = msg;
        urlStatus.style.color = isOk ? '#10b981' : '#f87171';
    }

    async function testBackendConnection(url){
        try{
            const resp = await fetch(url, {method:'GET', signal: AbortSignal.timeout(6000)});
            if(resp.ok){
                const data = await resp.json();
                if(data && data.servis){
                    updateUrlStatus('✅ Bağlantı başarılı! Backend: '+data.servis, true);
                    return true;
                }
            }
            updateUrlStatus('⚠️ Backend yanıt verdi ama format tanınmadı', false);
            return false;
        }catch(e){
            updateUrlStatus('❌ Bağlantı hatası: ' + e.message, false);
            return false;
        }
    }

    saveBtn.addEventListener('click', async function(){
        let url = backendInput.value.trim();
        if(!url){
            updateUrlStatus('Lütfen bir URL girin', false);
            return;
        }
        if(url.endsWith('/')) url = url.slice(0, -1);
        backendInput.value = url;
        updateUrlStatus('🔄 Bağlantı test ediliyor...', false);
        const ok = await testBackendConnection(url);
        if(ok){
            BACKEND_URL = url;
            localStorage.setItem('fkahin_backend_url', url);
        }
    });

    if(BACKEND_URL){
        backendInput.value = BACKEND_URL;
        testBackendConnection(BACKEND_URL).then(ok => { if(ok) BACKEND_URL = BACKEND_URL; });
    }

    scanBtn.addEventListener('click', async function(){
        const symbol = symbolInput.value.trim().toUpperCase();
        if(!symbol){
            scanStatus.textContent = 'Hisse kodu giriniz.';
            return;
        }
        if(!BACKEND_URL){
            scanStatus.textContent = 'Önce backend URL\'ini kaydedin.';
            return;
        }

        scanStatus.textContent = '⏳ Analiz yapılıyor...';
        resultArea.style.display = 'none';
        try{
            const resp = await fetch(`${BACKEND_URL}/analyze/${symbol}`, {
                method:'GET',
                signal: AbortSignal.timeout(25000)
            });
            if(!resp.ok){
                const txt = await resp.text();
                throw new Error(txt || 'Sunucu hatası');
            }
            const data = await resp.json();
            scanStatus.textContent = '';
            symbolDisplay.textContent = data.sembol || symbol;
            dnaDisplay.textContent = '🧬 DNA: ' + (data.dna_kodu || data.DNA_Kodu || 'HESAPLANAMADI');
            const signal = data.sinyal || '';
            signalDisplay.textContent = signal.includes('AL') ? '📈 AL' : (signal.includes('SAT') ? '📉 SAT' : signal || 'BEKLE');
            signalDisplay.className = 'signal-badge ' + (signal.includes('AL') ? 'AL' : 'SAT');
            strengthDisplay.textContent = (typeof data.guc === 'number') ? data.guc.toFixed(3) : '0.000';
            let reasons = data.bilimsel_gerekce || data.Bilimsel_Gerekce || {};
            let reasonText = '';
            if(typeof reasons === 'object'){
                reasonText = Object.entries(reasons).map(([k,v])=> `• ${k}: ${JSON.stringify(v)}`).join('\n');
            }else{
                reasonText = reasons;
            }
            reasonsDisplay.textContent = reasonText || 'Detaylı gerekçe bulunamadı.';
            resultArea.style.display = 'block';
        }catch(err){
            scanStatus.textContent = '❌ Hata: ' + err.message;
            console.error(err);
        }
    });

    symbolInput.addEventListener('input', function(e){
        this.value = this.value.toUpperCase();
    });
})();
</script>
</body>
</html>
