<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Fraktal Kahin · v2.5</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Courier New',monospace;background:#07090f;color:#c0cfe0;height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:12px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2a3a}
button{font-family:inherit}
input,select{font-family:inherit}
#topbar{background:#0b0e18;border-bottom:2px solid #e8b84b;padding:0 12px;height:44px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{color:#e8b84b;font-weight:700;font-size:15px;letter-spacing:3px}
.vtag{color:#00d4ff;font-size:9px;font-weight:700;letter-spacing:2px}
.vsub{font-size:8px;color:#2a3548}
#stbar{background:#050709;border-bottom:1px solid #131826;padding:3px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0}
#dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#stmsg{font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-sm{background:transparent;border:1px solid #1a2030;color:#4b5e78;padding:2px 7px;border-radius:3px;cursor:pointer;font-size:9px}
#sortbar{background:#080d14;border-bottom:1px solid #131826;padding:4px 8px;display:flex;gap:3px;align-items:center;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#sortbar::-webkit-scrollbar{display:none}
.srt{background:#0b0e18;border:1px solid #1a2030;color:#4b5e78;padding:3px 8px;font-size:9px;cursor:pointer;font-weight:700;border-radius:3px;white-space:nowrap}
.srt.on{background:#1a0d35;border-color:#e8b84b;color:#e8b84b}
#tabs{background:#0b0e18;border-bottom:1px solid #131826;display:flex;flex-shrink:0}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:8px 6px;cursor:pointer;font-size:9px;font-weight:700;color:#2a3548;white-space:nowrap;flex:1}
.tab.on{color:#e8b84b;border-bottom-color:#e8b84b}
#layout{display:flex;flex:1;overflow:hidden;min-height:0}
#sidebar{width:130px;background:#08090f;border-right:1px solid #131826;display:flex;flex-direction:column;flex-shrink:0}
#srch{width:100%;background:#0f1118;border:none;border-bottom:1px solid #131826;color:#fff;padding:7px 8px;font-size:11px;outline:none}
#wcnt{padding:3px 8px;font-size:9px;color:#4b5e78;border-bottom:1px solid #131826;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:3px}
.flt-btn{background:#0b0e18;border:1px solid #1a2030;color:#4b5e78;padding:2px 5px;border-radius:3px;cursor:pointer;font-size:8px;font-weight:700}
.flt-btn.on{background:#0d1f35;border-color:#22c55e;color:#22c55e}
#wlist{overflow-y:auto;flex:1}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.pnl{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.hide{display:none!important}
#dist-bar{background:#0b1510;border-bottom:1px solid #1a3a1a;padding:4px 8px;font-size:9px;display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.dist-chip{padding:1px 5px;border-radius:2px;font-weight:700}
#ftbl{flex:1;overflow-y:auto}
.card{background:#0b0e18;border:1px solid #131826;border-radius:5px;padding:8px 10px;margin-bottom:8px}
.ct{font-size:9px;letter-spacing:2px;color:#4b5e78;font-weight:700;margin-bottom:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.gi{display:flex;justify-content:space-between;font-size:10px;padding:2px 5px;background:#080c12;border-radius:2px}
.gl{color:#7a9ab8}.gv{font-weight:700}
.cbar{height:8px;border-radius:4px;overflow:hidden;background:#131826;margin:4px 0}
.cbar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.stat-box{background:#080c12;border-radius:4px;padding:6px;text-align:center}
.nvs-ring{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0}
.nvs-num{font-size:48px;font-weight:700;line-height:1;letter-spacing:-2px}
.nvs-lbl{font-size:11px;font-weight:700;letter-spacing:2px;margin-top:4px}
.nvs-bar{height:10px;border-radius:5px;overflow:hidden;background:#131826;margin:6px 0;width:100%}
.nvs-fill{height:100%;border-radius:5px;transition:width .4s ease}
.dec-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #0a0d14}
.dec-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
#rep{position:fixed;inset:0;background:#07090f;z-index:99;display:flex;flex-direction:column;overflow:hidden}
#rph{background:#0b0e18;border-bottom:1px solid #1a2030;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:4px}
#rpb{flex:1;overflow-y:auto;padding:8px 10px 0 10px}
#rpfoot{background:#0b0e18;border-top:1px solid #131826;padding:8px 10px;flex-shrink:0}
#psug{background:#0b1424;border:1px solid #1e3050;display:none;max-height:130px;overflow-y:auto;border-radius:0 0 5px 5px;margin-bottom:6px}
.frak-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:1px}
.lab-card{background:#0b0e18;border:1px solid #131826;border-radius:6px;padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.lab-card:hover{border-color:#22c55e}
.lab-card.guclu{border-left:4px solid #22c55e}
.lab-card.ok{border-left:4px solid #86efac}
.lab-card.zayif{border-left:4px solid #e8b84b}
.lab-card.fail{border-left:4px solid #ef4444}
.lab-status{display:inline-block;padding:2px 8px;border-radius:3px;font-weight:700;font-size:9px;letter-spacing:1px}
.lab-quality{font-size:18px;font-weight:700}
.lab-q-bar{height:6px;border-radius:3px;background:#131826;overflow:hidden;margin:4px 0}
.lab-q-fill{height:100%;transition:width .4s ease}
.lab-ind{display:inline-block;background:#080c12;padding:2px 6px;border-radius:2px;margin:2px 3px 2px 0;font-size:9px;color:#86efac}
.lab-stat{font-size:9px;color:#7a9ab8;margin-top:4px}
.lab-empty{text-align:center;padding:30px 20px;color:#4b5e78;font-size:11px}
.today-banner{background:linear-gradient(180deg, #052e16 0%, #0b1510 100%);border:2px solid #22c55e;border-radius:6px;padding:10px;margin-bottom:10px}
.today-title{font-size:11px;font-weight:700;color:#22c55e;letter-spacing:2px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.today-card{background:#022d10;border:1px solid #14532d;border-radius:4px;padding:8px;margin-bottom:6px;cursor:pointer;transition:transform .15s}
.today-card:hover{transform:translateX(2px)}
.today-fresh{border-left:4px solid #22c55e}
.today-old{border-left:4px solid #e8b84b;opacity:0.7}

/* === NİHAİ KARAR KUTUSU === */
.karar-box{background:linear-gradient(180deg,#0a1418 0%,#050a0e 100%);border:3px solid;border-radius:8px;padding:12px;margin-bottom:10px}
.karar-box.al{border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,0.2)}
.karar-box.bekle{border-color:#e8b84b;box-shadow:0 0 15px rgba(232,184,75,0.15)}
.karar-box.alma{border-color:#ef4444;box-shadow:0 0 15px rgba(239,68,68,0.15)}
.karar-buyuk{font-size:28px;font-weight:700;letter-spacing:3px;text-align:center;padding:8px 0;line-height:1}
.karar-aciklama{font-size:11px;color:#c0cfe0;line-height:1.5;text-align:center;margin-top:6px}
.kapi{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:#080c12;border-radius:4px;margin-bottom:4px;font-size:10px}
.kapi-pass{border-left:3px solid #22c55e}
.kapi-fail{border-left:3px solid #ef4444}
.kapi-warn{border-left:3px solid #e8b84b}
</style>
</head>
<body>
<div id="topbar">
  <span class="logo">BIST</span>
  <div>
    <div class="vtag">FRAKTAL KAHİN · v2.5</div>
    <div class="vsub">630 hisse · Adaptif DNA · Nihai Karar</div>
  </div>
  <span id="clk" style="font-size:10px;color:#2a3548;margin-left:auto"></span>
</div>
<div id="stbar">
  <div id="dot" style="background:#e8b84b"></div>
  <span id="stmsg" style="color:#e8b84b">Başlatılıyor...</span>
  <button class="btn-sm" onclick="refresh(true)">↻</button>
</div>
<div id="sortbar">
  <span style="font-size:9px;color:#4b5e78;flex-shrink:0">Sırala:</span>
  <button class="srt on" onclick="setSort('nvs',this)">NVS</button>
  <button class="srt" onclick="setSort('bkm',this)">BKM</button>
  <button class="srt" onclick="setSort('gunluk',this)">Günlük</button>
  <button class="srt" onclick="setSort('guven_skoru',this)">GS</button>
  <button class="srt" onclick="setSort('gunluk_degisim',this)">GÜN%</button>
  <button class="srt" onclick="setSort('sembol',this)">A-Z</button>
</div>
<div id="tabs">
  <button class="tab on" onclick="showTab('tp-f',this)">📈 NVS</button>
  <button class="tab" onclick="showTab('tp-fr',this)" style="color:#a78bfa">🧬 FRAK</button>
  <button class="tab" onclick="showTab('tp-lab',this)" style="color:#22c55e">🔬 LAB</button>
  <button class="tab" onclick="showTab('tp-bt',this)">📊 BCKT</button>
  <button class="tab" onclick="showTab('tp-p',this)">💼 PRT</button>
</div>
<div id="layout">
  <div id="sidebar">
    <input id="srch" placeholder="🔍 Ara..." oninput="renderSidebar()">
    <div id="wcnt">
      <span id="wcnt-lbl">—</span>
      <button id="flt-gal" class="flt-btn" onclick="toggleFlt()">▲ AL+</button>
    </div>
    <div id="wlist"></div>
  </div>
  <div id="main">
    <div id="tp-f" class="pnl">
      <div id="dist-bar">—</div>
      <div id="ftbl"></div>
    </div>
    <div id="tp-fr" class="pnl hide">
      <div style="background:#0f0b18;border-bottom:1px solid #2e1a4d;padding:6px 10px;flex-shrink:0">
        <div style="font-size:11px;font-weight:700;color:#a78bfa;margin-bottom:4px">🧬 FRAKTAL · Gerçek Dip Dönüşü</div>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <label style="font-size:10px;color:#7a9ab8">Top K:</label>
          <select id="fr-topk" style="background:#0f1118;border:1px solid #2a3548;color:#fff;padding:4px;font-size:10px;border-radius:3px">
            <option value="10">10</option><option value="20" selected>20</option><option value="30">30</option>
          </select>
          <label style="font-size:10px;color:#7a9ab8">Min NVS:</label>
          <select id="fr-minnvs" style="background:#0f1118;border:1px solid #2a3548;color:#fff;padding:4px;font-size:10px;border-radius:3px">
            <option value="50">50</option><option value="65" selected>65</option><option value="80">80</option>
          </select>
          <button onclick="runFraktalTop()" style="background:#7c3aed;border:none;color:#fff;padding:6px 14px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">▶ ANALİZ</button>
        </div>
        <div id="fr-stat" style="margin-top:5px;font-size:9px;color:#4b5e78"></div>
      </div>
      <div id="fr-area" style="flex:1;overflow-y:auto;padding:6px">
        <div style="padding:20px;text-align:center;color:#2a3548;font-size:10px">🧬 ANALİZ butonuna bas</div>
      </div>
    </div>
    <div id="tp-lab" class="pnl hide">
      <div style="background:#0b1810;border-bottom:1px solid #1a3a1a;padding:6px 10px;flex-shrink:0">
        <div style="font-size:11px;font-weight:700;color:#22c55e;margin-bottom:4px">🔬 FRAKTAL KAHİN LAB</div>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <button onclick="loadTodaySignals()" style="background:#22c55e;border:none;color:#000;padding:6px 12px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">⚡ BUGÜN AL VEREN</button>
          <button onclick="loadLabList(true)" class="btn-sm">🔄 DNA Listesi</button>
          <button onclick="batchProduceDNA()" class="btn-sm">⚙ TOPLU ÜRET</button>
          <select id="lab-status" onchange="renderLabList()" style="background:#0f1118;border:1px solid #2a3548;color:#fff;padding:4px;font-size:10px;border-radius:3px">
            <option value="">Tümü</option><option value="GÜÇLÜ">GÜÇLÜ</option><option value="OK">OK</option><option value="ZAYIF">ZAYIF</option>
          </select>
          <select id="lab-minq" onchange="renderLabList()" style="background:#0f1118;border:1px solid #2a3548;color:#fff;padding:4px;font-size:10px;border-radius:3px">
            <option value="0">Q 0+</option><option value="40">Q 40+</option><option value="50" selected>Q 50+</option><option value="60">Q 60+</option>
          </select>
        </div>
        <div id="lab-stat" style="margin-top:5px;font-size:9px;color:#4b5e78"></div>
      </div>
      <div id="lab-area" style="flex:1;overflow-y:auto;padding:6px">
        <div class="lab-empty">🔬 LAB · "⚡ BUGÜN AL VEREN" veya "🔄 DNA Listesi"</div>
      </div>
    </div>
    <div id="tp-bt" class="pnl hide">
      <div style="background:#0b0e18;border-bottom:1px solid #131826;padding:6px 10px;flex-shrink:0">
        <div style="font-size:10px;font-weight:700;color:#e8b84b;margin-bottom:5px">📊 BACKTEST</div>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <input id="bt-sym" value="THYAO" style="background:#0f1118;border:1px solid #2a3548;color:#fff;padding:5px 8px;font-size:11px;border-radius:3px;width:80px" oninput="this.value=this.value.toUpperCase()">
          <select id="bt-period" style="background:#0f1118;border:1px solid #2a3548;color:#fff;padding:5px;font-size:10px;border-radius:3px">
            <option value="1y">1 Yıl</option><option value="2y" selected>2 Yıl</option><option value="5y">5 Yıl</option>
          </select>
          <button onclick="runBacktest()" style="background:#7c3aed;border:none;color:#fff;padding:5px 12px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">▶ ÇALIŞTIR</button>
        </div>
      </div>
      <div id="bt-area" style="flex:1;overflow-y:auto;padding:8px"><div style="padding:16px;text-align:center;color:#2a3548;font-size:10px">Hisse seç, periyot seç, ÇALIŞTIR.</div></div>
    </div>
    <div id="tp-p" class="pnl hide">
      <div style="background:#0b1020;border-bottom:1px solid #1e3050;padding:8px 12px;font-size:12px;font-weight:700;color:#e8b84b;flex-shrink:0">💼 PORTFÖY</div>
      <div style="padding:8px 10px;border-bottom:1px solid #131826;flex-shrink:0">
        <input id="psi" placeholder="Hisse ara..." oninput="sugPF(this.value)" style="width:100%;background:#060a10;border:1px solid #1e3050;color:#fff;padding:8px 10px;border-radius:5px;font-size:12px;outline:none;margin-bottom:6px">
        <div id="psug"></div>
        <div id="plbl" style="font-size:12px;font-weight:700;color:#e8b84b;margin-bottom:6px">— seçilmedi</div>
        <div style="display:flex;gap:8px">
          <button onclick="pfAdd()" style="flex:1;background:#22c55e;color:#000;border:none;padding:9px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700">+ EKLE</button>
          <button onclick="pfRem()" style="flex:1;background:#300;color:#f44;border:none;padding:9px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700">− ÇIKAR</button>
        </div>
      </div>
      <div id="plist" style="flex:1;overflow-y:auto"></div>
    </div>
  </div>
</div>
<div id="rep" class="hide">
  <div id="rph">
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex:1;min-width:0">
      <div id="rsym" style="font-size:15px;font-weight:700;color:#e8b84b">—</div>
      <div id="rbig" style="font-size:11px;font-weight:700;padding:3px 7px;border-radius:4px;border:1px solid #131826">—</div>
      <div id="rcs" style="font-size:10px;color:#4b5e78"></div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
      <button id="r-tkip" onclick="toggleTakip()" class="btn-sm" style="padding:4px 8px">☆</button>
      <button onclick="closeRep()" style="background:#ef4444;border:none;color:#fff;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:11px;font-weight:700">✕</button>
    </div>
  </div>
  <div id="rpb"></div>
  <div id="rpfoot">
    <div style="display:flex;gap:6px">
      <button onclick="repLab()" style="flex:1;background:#22c55e;color:#000;border:none;padding:11px 0;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer">🔬 LAB</button>
      <button onclick="repFraktal()" style="flex:1;background:#7c3aed;color:#fff;border:none;padding:11px 0;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer">🧬 FRAK</button>
      <button onclick="repTV()" style="flex:1;background:#e8b84b;color:#000;border:none;padding:11px 0;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer">📈 TV</button>
      <button onclick="closeRep()" style="flex:1;background:#ef4444;color:#fff;border:none;padding:11px 0;font-size:11px;font-weight:700;border-radius:5px;cursor:pointer">✕</button>
    </div>
  </div>
</div>
<script>
const K_PF='fk_pf_v1', K_TK='fk_tk_v1';
let STOCKS=[], DIST={}, SURE_MS=0;
let SORT_BY='nvs', FLT_UP=false;
let CURRENT_SYM='', CURRENT_NVS_DATA=null, CURRENT_LAB_DATA=null, CURRENT_FRAK_DATA=null;
let PF=[], TAKIP={}, PFS='';
let LAB_DATA=[], TODAY_DATA=null;

function G(id){return document.getElementById(id);}
function esc(s){return(s||'').toString().replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function loadStore(){try{PF=JSON.parse(localStorage.getItem(K_PF)||'[]');}catch(e){PF=[];}try{TAKIP=JSON.parse(localStorage.getItem(K_TK)||'{}');}catch(e){TAKIP={};}}
function saveStore(){try{localStorage.setItem(K_PF,JSON.stringify(PF));}catch(e){}try{localStorage.setItem(K_TK,JSON.stringify(TAKIP));}catch(e){}}
function nvsLabel(n){if(n==null)return{t:'—',c:'#475569',bg:'#1e293b',emoji:''};if(n>=80)return{t:'GÜÇLÜ AL',c:'#22c55e',bg:'#052e16',emoji:'🟢'};if(n>=65)return{t:'AL',c:'#86efac',bg:'#022d10',emoji:'🟩'};if(n>=45)return{t:'NÖTR',c:'#94a3b8',bg:'#1e293b',emoji:'⬜'};if(n>=30)return{t:'SAT',c:'#fca5a5',bg:'#3b1010',emoji:'🟥'};return{t:'GÜÇLÜ SAT',c:'#ef4444',bg:'#450a0a',emoji:'🔴'};}
function frLabel(s){if(s==null)return{t:'VERİ YOK',c:'#475569',bg:'#1e293b'};if(s>=85)return{t:'GERÇEK AL',c:'#22c55e',bg:'#052e16'};if(s>=65)return{t:'BEKLE',c:'#e8b84b',bg:'#2d1a00'};return{t:'GEÇERSİZ',c:'#ef4444',bg:'#450a0a'};}
function labLabel(s,q){if(s==='GÜÇLÜ'||(q!=null&&q>=60))return{t:'GÜÇLÜ',c:'#22c55e',bg:'#052e16',cls:'guclu'};if(s==='OK'||(q!=null&&q>=50))return{t:'OK',c:'#86efac',bg:'#022d10',cls:'ok'};if(s==='ZAYIF'||(q!=null&&q>=40))return{t:'ZAYIF',c:'#e8b84b',bg:'#2d1a00',cls:'zayif'};return{t:'FAIL',c:'#ef4444',bg:'#450a0a',cls:'fail'};}
function sigLabel(s){if(s==null)return{t:'—',bg:'#1e293b',c:'#475569'};if(s>=75)return{t:'G.AL',bg:'#14532d',c:'#22c55e'};if(s>=60)return{t:'AL',bg:'#052e16',c:'#86efac'};if(s>=42)return{t:'NOTR',bg:'#1e293b',c:'#94a3b8'};if(s>=28)return{t:'SAT',bg:'#3b1010',c:'#fca5a5'};return{t:'G.SAT',bg:'#450a0a',c:'#ef4444'};}
function csLabel(cs){if(cs>=80)return{t:'YÜKSEK',c:'#22c55e'};if(cs>=65)return{t:'ORTA',c:'#86efac'};if(cs>=45)return{t:'DÜŞÜK',c:'#e8b84b'};return{t:'YOK',c:'#ef4444'};}
function setStatus(s,m){const c=s===true?'#22c55e':s===false?'#ef4444':'#e8b84b';const d=G('dot'),el=G('stmsg');if(d)d.style.background=c;if(el){el.textContent=m;el.style.color=c;}}

// NİHAİ KARAR HESAPLAMA — 3 KAPI MANTIĞI
// ═══════════════════════════════════════════════════════════
function hesaplaNihaiKarar(nvsData, labData, frakData){
  const nvs = nvsData?.nvs;
  const labQ = labData?.quality;
  const labStatus = labData?.status;
  const frakSkor = frakData?.fraktal_skor;

  // Kapı 1 — NVS ≥ 65?
  const kapi1 = nvs != null && nvs >= 65;
  // Kapı 2 — Fraktal ≥ 65?
  const kapi2 = frakSkor != null && frakSkor >= 65;
  // Kapı 3 — LAB DNA Kalitesi ≥ 50?
  const kapi3 = labQ != null && labQ >= 50;

  // Frak/Lab veri yoksa "Bilgi eksik"
  const labMissing = labData == null || labQ == null;
  const frakMissing = frakData == null || frakSkor == null;

  let karar, renk, cls, aciklama;
  
  if (!kapi1) {
    karar = 'ALMA';
    renk = '#ef4444';
    cls = 'alma';
    aciklama = `NVS ${nvs ?? '?'} · Genel sağlık yetersiz. Kapı 1 başarısız.`;
  } else if (frakMissing) {
    karar = 'BEKLE';
    renk = '#e8b84b';
    cls = 'bekle';
    aciklama = `NVS ${nvs} ✓ · Fraktal analizi yapılmamış. Önce 🧬 FRAK butonuna bas.`;
  } else if (!kapi2) {
    karar = 'ALMA';
    renk = '#ef4444';
    cls = 'alma';
    aciklama = `NVS ${nvs} ✓ · Fraktal ${frakSkor} ✗ · Zirveden alma riski. Dip dönüşü kanıtlanmamış.`;
  } else if (labMissing) {
    karar = 'BEKLE';
    renk = '#e8b84b';
    cls = 'bekle';
    aciklama = `NVS ${nvs} ✓ · Fraktal ${frakSkor} ✓ · DNA üretilmemiş. Önce 🔬 LAB butonuna bas.`;
  } else if (!kapi3) {
    karar = 'BEKLE';
    renk = '#e8b84b';
    cls = 'bekle';
    aciklama = `NVS ${nvs} ✓ · Fraktal ${frakSkor} ✓ · DNA Kalite ${labQ?.toFixed(1)} ✗ · Bu hisse için güvenilir strateji yok.`;
  } else {
    // 3 kapı geçti — pozisyon büyüklüğü
    const buyuk = (frakSkor >= 85 && labQ >= 70);
    const orta = (frakSkor >= 75 && labQ >= 60);
    
    karar = 'AL';
    renk = '#22c55e';
    cls = 'al';
    
    if (buyuk) {
      aciklama = `NVS ${nvs} · Fraktal ${frakSkor} · DNA ${labQ.toFixed(1)} · Tüm kapılar güçlü geçti. TAM POZİSYON (sermayenin %15-20'si)`;
    } else if (orta) {
      aciklama = `NVS ${nvs} · Fraktal ${frakSkor} · DNA ${labQ.toFixed(1)} · 3 kapı geçti. ORTA POZİSYON (%10)`;
    } else {
      aciklama = `NVS ${nvs} · Fraktal ${frakSkor} · DNA ${labQ.toFixed(1)} · 3 kapı geçti ama sınırda. KÜÇÜK POZİSYON (%5-7)`;
    }
  }

  return {
    karar, renk, cls, aciklama,
    kapi1, kapi2, kapi3,
    labMissing, frakMissing,
    nvs, frakSkor, labQ
  };
}

function renderKararKutusu(){
  const card = G('karar-card');
  if (!card) return;
  
  const k = hesaplaNihaiKarar(CURRENT_NVS_DATA, CURRENT_LAB_DATA, CURRENT_FRAK_DATA);
  
  let H = `<div class="ct">⚡ NİHAİ KARAR</div>`;
  H += `<div class="karar-buyuk" style="color:${k.renk}">${k.karar}</div>`;
  H += `<div class="karar-aciklama">${esc(k.aciklama)}</div>`;
  H += `<div style="margin-top:10px">`;
  
  // Kapı 1
  const k1cls = k.kapi1 ? 'kapi-pass' : 'kapi-fail';
  const k1ico = k.kapi1 ? '✓' : '✗';
  const k1col = k.kapi1 ? '#22c55e' : '#ef4444';
  H += `<div class="kapi ${k1cls}"><span><span style="color:${k1col}">${k1ico}</span> Kapı 1: NVS ≥ 65</span><span style="color:${k1col};font-weight:700">${k.nvs ?? '—'}</span></div>`;
  
  // Kapı 2
  let k2cls, k2ico, k2col, k2val;
  if (k.frakMissing) { k2cls='kapi-warn'; k2ico='?'; k2col='#e8b84b'; k2val='Hesaplanmadı'; }
  else if (k.kapi2) { k2cls='kapi-pass'; k2ico='✓'; k2col='#22c55e'; k2val=k.frakSkor; }
  else { k2cls='kapi-fail'; k2ico='✗'; k2col='#ef4444'; k2val=k.frakSkor; }
  H += `<div class="kapi ${k2cls}"><span><span style="color:${k2col}">${k2ico}</span> Kapı 2: Fraktal ≥ 65 (zirveden alma yok)</span><span style="color:${k2col};font-weight:700">${k2val}</span></div>`;
  
  // Kapı 3
  let k3cls, k3ico, k3col, k3val;
  if (k.labMissing) { k3cls='kapi-warn'; k3ico='?'; k3col='#e8b84b'; k3val='Hesaplanmadı'; }
  else if (k.kapi3) { k3cls='kapi-pass'; k3ico='✓'; k3col='#22c55e'; k3val=k.labQ?.toFixed(1); }
  else { k3cls='kapi-fail'; k3ico='✗'; k3col='#ef4444'; k3val=k.labQ?.toFixed(1); }
  H += `<div class="kapi ${k3cls}"><span><span style="color:${k3col}">${k3ico}</span> Kapı 3: LAB DNA Kalitesi ≥ 50</span><span style="color:${k3col};font-weight:700">${k3val}</span></div>`;
  
  H += `</div>`;
  
  card.className = `karar-box ${k.cls}`;
  card.innerHTML = H;
}

  G('rsym').textContent=sym;
  G('rbig').textContent='Yükleniyor...';

    if(d.hata){G('rpb').innerHTML=`<div style="text-align:center;padding:20px;color:#ef4444">✗ ${esc(d.hata)}</div>`;return;}

          renderKararKutusu();

      }
    }).catch(()=>{});
  }catch(e){G('rpb').innerHTML=`<div style="text-align:center;padding:20px;color:#ef4444">✗ ${esc(e.message)}</div>`;}
}

  tf.forEach((f,i)=>{const fc=f.impact>0?'#22c55e':f.impact<0?'#ef4444':'#94a3b8';const fi=f.impact>0?'▲':f.impact<0?'▼':'–';const r=['1.','2.','3.'][i];H+=`<div class="dec-row"><div class="dec-icon" style="background:${f.impact>0?'#052e16':f.impact<0?'#450a0a':'#1e293b'};color:${fc}">${fi}</div><div style="flex:1"><div style="font-size:10px;font-weight:700;color:#c0cfe0">${r} ${esc(f.n)}</div><div style="font-size:9px;color:#4b5e78">Değer: <span style="color:${fc}">${esc(f.raw)}</span> · Katkı: ${Math.round(f.w)}p</div></div><div style="font-size:16px;font-weight:700;color:${fc}">${f.impact>0?'+':''}${Math.round(f.impact)}</div></div>`;});
  H+=`</div>`;
  H+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:3px;margin-bottom:8px">`;
  [{n:'G',v:d.gunluk},{n:'H',v:d.haftalik},{n:'A',v:d.aylik},{n:'BKM',v:d.bkm,sp:true},{n:'NVS',v:nvs,gold:true}].forEach(x=>{const xs=x.gold?nl:sigLabel(x.v);H+=`<div style="background:${x.sp?'#1a0d35':'#0b0e18'};border:1px solid ${x.sp?'#7c3aed':'#131826'};padding:5px;border-radius:4px;text-align:center"><div style="font-size:8px;color:#4b5e78">${x.n}</div><div style="font-size:17px;font-weight:700;color:${xs.c}">${x.v}</div><div style="font-size:7px;font-weight:700;background:${xs.bg};color:${xs.c};padding:1px 2px;border-radius:2px">${xs.t}</div></div>`;});
  H+=`</div>`;
  const fv=(v,p)=>v==null||isNaN(v)?'<span style="color:#2a3548">—</span>':(+v).toFixed(p!=null?p:1);
  H+=`<div class="card"><div class="ct">VERİ · TV SCANNER</div><div class="g2">`;
  [['TV Rec G',fv(ham.rec,3)],['RSI G',fv(ham.rsi)],['RSI H',fv(hamW.rsi)],['RSI A',fv(hamM.rsi)],['Stoch G',fv(ham.stoch)],['MACD G',fv(ham.macd,4)],['EMA20',ham.ema20!=null?(ham.ema20>0?'Üst':'Alt'):'—'],['EMA50',ham.ema50!=null?(ham.ema50>0?'Üst':'Alt'):'—'],['EMA200',ham.ema200!=null?(ham.ema200>0?'Üst':'Alt'):'—'],['ADX',fv(ham.adx)],['Hacim',(ham.vol&&ham.vol_avg&&ham.vol_avg>0)?(ham.vol/ham.vol_avg).toFixed(1)+'×':'—'],['GÜN%',d.gunluk_degisim!=null?(d.gunluk_degisim>0?'+':'')+(+d.gunluk_degisim).toFixed(2)+'%':'—']].forEach(r=>{H+=`<div class="gi"><span class="gl">${r[0]}</span><span class="gv">${r[1]}</span></div>`;});
  H+=`</div></div>`;
  if(cl!=null){
    const atrV=0.025*cl;
    const sl=(cl-atrV*2).toFixed(2),tp1=(cl*1.05).toFixed(2),tp2=(cl*1.10).toFixed(2),tp3=(cl*1.18).toFixed(2);
    const rr=((cl*1.10-cl)/(cl-parseFloat(sl))).toFixed(1);
    H+=`<div class="card"><div class="ct">GİRİŞ / ÇIKIŞ</div><div class="g2"><div class="gi"><span class="gl">Fiyat</span><span class="gv" style="color:#00d4ff">₺${(+cl).toFixed(2)}</span></div><div class="gi"><span class="gl">Stop</span><span class="gv" style="color:#ef4444">₺${sl}</span></div><div class="gi"><span class="gl">TP1 +5%</span><span class="gv" style="color:#e8b84b">₺${tp1}</span></div><div class="gi"><span class="gl">TP2 +10%</span><span class="gv" style="color:#22c55e">₺${tp2}</span></div><div class="gi"><span class="gl">TP3 +18%</span><span class="gv" style="color:#22c55e">₺${tp3}</span></div><div class="gi"><span class="gl">R/R</span><span class="gv" style="color:${parseFloat(rr)>=2?'#22c55e':'#ef4444'}">1:${rr}</span></div></div></div>`;
  }
  G('rpb').innerHTML=H;
  
  // İlk render'da NVS hazır, diğerleri yükleniyor
  renderKararKutusu();
}

// LAB sekmesi (önceki versiyondan korunuyor)
async function loadTodaySignals(){
  G('lab-stat').innerHTML='<span style="color:#22c55e">⚡ Bugün AL veren hisseler taranıyor (60-90 sn)...</span>';
  G('lab-area').innerHTML='<div class="lab-empty">⚡ Lütfen bekle, ilk seferde uzun sürer.</div>';
  try{
    const data=await apiLabToday(false);
    TODAY_DATA=data;
    if(LAB_DATA.length===0){try{const ll=await apiLabList();LAB_DATA=ll.dna_kartlari||[];}catch(e){}}
    renderLabCombined();
  }catch(e){G('lab-stat').innerHTML=`<span style="color:#ef4444">✗ ${esc(e.message)}</span>`;G('lab-area').innerHTML=`<div class="lab-empty" style="color:#ef4444">✗ ${esc(e.message)}</div>`;}
}
async function loadLabList(force){
  G('lab-stat').innerHTML='<span style="color:#e8b84b">🔄 DNA listesi yükleniyor...</span>';
  try{const data=await apiLabList();LAB_DATA=data.dna_kartlari||[];renderLabCombined();}
  catch(e){G('lab-stat').innerHTML=`<span style="color:#ef4444">✗ ${esc(e.message)}</span>`;}
}
function renderLabCombined(){
  let H='';
  if(TODAY_DATA&&TODAY_DATA.sonuclar&&TODAY_DATA.sonuclar.length>0){
    H+=`<div class="today-banner"><div class="today-title"><span>⚡ BUGÜN AL VEREN (${TODAY_DATA.sonuclar.length})</span><button class="btn-sm" onclick="loadTodaySignals()" style="background:#22c55e;color:#000">↻</button></div><div style="font-size:9px;color:#86efac;margin-bottom:6px">Son 5 gün içinde DNA'sı sinyal verenler · ${TODAY_DATA.taranan} taranı</div>`;
    for(const r of TODAY_DATA.sonuclar){
      const fresh=r.is_fresh,cls=fresh?'today-fresh':'today-old';
      const bars=r.bars_since_signal===0?'BUGÜN':r.bars_since_signal===1?'DÜN':`${r.bars_since_signal} gün önce`;
      const change=r.change_since_signal_pct;
      const chgColor=change>0?'#22c55e':change<0?'#ef4444':'#94a3b8';
      H+=`<div class="today-card ${cls}" onclick="openDetail('${esc(r.symbol)}')"><div style="display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:14px;font-weight:700;color:#fff">${esc(r.symbol)}</span><span style="font-size:9px;color:#86efac;margin-left:6px">${esc(r.strategy||'-')}</span></div><div style="text-align:right"><div style="font-size:10px;color:${fresh?'#22c55e':'#e8b84b'};font-weight:700">${esc(bars)}</div><div style="font-size:9px;color:${chgColor}">${change>0?'+':''}${change?.toFixed(2)}%</div></div></div><div style="font-size:9px;color:#7a9ab8;margin-top:3px">Sinyal: ₺${r.signal_close} · Şimdi: ₺${r.last_close} · DNA: ${r.dna_quality?.toFixed(1)||'—'}</div></div>`;
    }
    H+=`</div>`;
  }else if(TODAY_DATA){
    H+=`<div class="today-banner" style="border-color:#e8b84b"><div class="today-title" style="color:#e8b84b"><span>⚡ BUGÜN SİNYAL YOK</span></div><div style="font-size:10px;color:#7a9ab8">${TODAY_DATA.taranan||0} hisse tarandı, son 5 gün içinde sinyal yok.</div></div>`;
  }
  const fS=G('lab-status')?.value||'',fQ=parseFloat(G('lab-minq')?.value||'0');
  let rows=LAB_DATA.slice();
  if(fS)rows=rows.filter(r=>r.status===fS);
  if(fQ>0)rows=rows.filter(r=>(r.quality||0)>=fQ);
  const totalQ=rows.reduce((s,r)=>s+(r.quality||0),0),avgQ=rows.length>0?(totalQ/rows.length).toFixed(1):'—';
  const okC=LAB_DATA.filter(r=>r.status==='OK'||r.status==='GÜÇLÜ').length,gC=LAB_DATA.filter(r=>r.status==='GÜÇLÜ').length;
  G('lab-stat').innerHTML=`📊 DNA: <b>${LAB_DATA.length}</b> · 🟢 GÜÇLÜ: <b style="color:#22c55e">${gC}</b> · ✅ OK: <b style="color:#86efac">${okC}</b> · Filtre: <b>${rows.length}</b> · Q ort: <b style="color:#e8b84b">${avgQ}</b>`;
  if(rows.length>0){
    H+=`<div style="margin-top:10px;font-size:10px;color:#4b5e78;letter-spacing:1px;font-weight:700">📚 TÜM DNA KARTLARI</div>`;
    rows.sort((a,b)=>(b.quality||0)-(a.quality||0));
    for(const r of rows){
      const lbl=labLabel(r.status,r.quality),inds=(r.indicators||[]).join(' + '),ageH=r.age_hours||0;
      const ageStr=ageH<24?`${ageH.toFixed(1)}sa`:`${(ageH/24).toFixed(1)}gün`;
      H+=`<div class="lab-card ${lbl.cls}" onclick="openDetail('${esc(r.symbol)}')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div><span style="font-size:14px;font-weight:700;color:#fff">${esc(r.symbol)}</span><span class="lab-status" style="background:${lbl.bg};color:${lbl.c};margin-left:6px">${lbl.t}</span><span style="font-size:9px;color:#4b5e78;margin-left:4px">· ${esc(r.mode||'-')}</span></div><div class="lab-quality" style="color:${lbl.c}">${r.quality?r.quality.toFixed(1):'—'}</div></div><div class="lab-q-bar"><div class="lab-q-fill" style="width:${r.quality||0}%;background:${lbl.c}"></div></div><div style="font-size:9px;color:#7a9ab8;margin-top:4px">Strateji: ${inds.split(' + ').map(i=>`<span class="lab-ind">${esc(i)}</span>`).join('')}</div><div class="lab-stat">Yaş: ${ageStr} · <span onclick="event.stopPropagation();regenerateDNA('${esc(r.symbol)}')" style="color:#7c3aed;cursor:pointer;text-decoration:underline">🔄 Yeniden Üret</span></div></div>`;
    }
  }
  if(H==='')H='<div class="lab-empty">DNA yok. ⚙ TOPLU ÜRET ile başla.</div>';
  G('lab-area').innerHTML=H;
}
function renderLabList(){renderLabCombined();}
async function regenerateDNA(sym){
  if(!confirm(`${sym} için DNA yeniden üretilsin mi?`))return;
  G('lab-stat').innerHTML=`<span style="color:#e8b84b">🔄 ${esc(sym)}...</span>`;
  try{await apiLab(sym,true);await loadLabList(false);}catch(e){G('lab-stat').innerHTML=`<span style="color:#ef4444">✗ ${esc(e.message)}</span>`;}
}
async function batchProduceDNA(){
  const existing=new Set(LAB_DATA.map(d=>d.symbol));
  const candidates=STOCKS.filter(s=>(s.nvs||0)>=65&&!existing.has(s.sembol)).slice(0,10);
  if(candidates.length===0){alert('NVS≥65 hisselerin DNA\'ları zaten üretilmiş.');return;}
  if(!confirm(`${candidates.length} hisse için DNA üretilecek. Süre: ~${candidates.length*15} sn. Devam?`))return;
  for(let i=0;i<candidates.length;i++){
    const sym=candidates[i].sembol;
    G('lab-stat').innerHTML=`<span style="color:#e8b84b">🔄 ${i+1}/${candidates.length}: ${esc(sym)}...</span>`;
    try{await apiLab(sym,false);}catch(e){console.error(`${sym}:`,e);}
  }
  await loadLabList(false);
}
async function runFraktalTop(force){
  const topk=parseInt(G('fr-topk').value),minnvs=parseInt(G('fr-minnvs').value);
  G('fr-stat').innerHTML=`<span style="color:#e8b84b">🔄 ${topk} hisse analiz ediliyor...</span>`;
  G('fr-area').innerHTML=`<div style="padding:20px;text-align:center;color:#4b5e78">🧬 Hesaplanıyor...</div>`;
  try{const d=await apiFraktalTop(topk,minnvs,force);if(d.hata)G('fr-stat').innerHTML=`<span style="color:#ef4444">⚠ ${esc(d.hata)}</span>`;renderFraktalTop(d);}
  catch(e){G('fr-stat').innerHTML=`<span style="color:#ef4444">✗ ${esc(e.message)}</span>`;G('fr-area').innerHTML=`<div style="padding:20px;color:#ef4444">✗ ${esc(e.message)}</div>`;}
}
function renderFraktalTop(d){
  const rows=d.sonuclar||[],dag=d.dagilim||{};
  const fNote=(d.basarisiz&&d.basarisiz>0)?`<span style="color:#e8b84b">· ⚠ ${d.basarisiz} başarısız</span>`:'';
  G('fr-stat').innerHTML=`✓ ${d.islenen||0} işlendi · ${d.sure_ms||0}ms ${fNote} · <span style="color:#22c55e">🟢 ${dag.gercek_al||0}</span> · <span style="color:#e8b84b">🟡 ${dag.bekle||0}</span> · <span style="color:#ef4444">🔴 ${dag.gecersiz||0}</span>`;
  if(!rows.length){G('fr-area').innerHTML=`<div style="padding:20px;color:#4b5e78">${esc(d.uyari||'Sonuç yok')}</div>`;return;}
  let H='';
  for(const r of rows){
    const fr=frLabel(r.fraktal_skor),nl=nvsLabel(r.nvs);
    H+=`<div onclick="openDetail('${esc(r.sembol)}')" style="background:#0b0e18;border:1px solid ${fr.c}44;border-radius:5px;padding:8px 10px;margin-bottom:6px;cursor:pointer"><div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:14px;font-weight:700;color:#fff">${esc(r.sembol)}</span><span class="frak-badge" style="background:${fr.bg};color:${fr.c}">${fr.t}</span><span style="font-size:10px;color:${nl.c}">NVS ${r.nvs}</span></div><div style="font-size:18px;font-weight:700;color:${fr.c}">${r.fraktal_skor??'—'}</div></div></div>`;
  }
  G('fr-area').innerHTML=H;
}
function renderFraktalCard(d,card){
  if(!card)return;
  if(!d.yeterli_veri||d.fraktal_skor==null){card.innerHTML=`<div class="ct">🧬 FRAKTAL</div><div style="color:#ef4444;padding:8px;font-size:10px">✗ ${esc(d.hata||'Yeterli veri yok')}</div>`;return;}
  const fr=frLabel(d.fraktal_skor);
  let H=`<div class="ct" style="color:${fr.c}">🧬 FRAKTAL</div><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="font-size:36px;font-weight:700;color:${fr.c};line-height:1">${d.fraktal_skor}</div><div><div style="font-size:12px;font-weight:700;color:${fr.c}">${fr.t}</div><div style="font-size:9px;color:#4b5e78">${d.gecen_kosul}/5 koşul geçti</div></div></div>`;
  const titles={'1_crossover':'1. Kesişim','2_slope':'2. Eğim','3_dip_history':'3. Dip','4_no_blowoff':'4. Aşırı YOK','5_volume':'5. Hacim'};
  for(const [k,t] of Object.entries(titles)){

    H+=`<div class="dec-row"><div class="dec-icon" style="background:${c.gecti?'#052e16':'#450a0a'};color:${col}">${ico}</div><div style="flex:1"><div style="font-size:10px;font-weight:700">${t}</div><div style="font-size:9px;color:#4b5e78">${esc(c.aciklama||'—')}</div></div><div style="font-size:12px;font-weight:700;color:${col}">${c.puan||0}p</div></div>`;

async function runBacktest(){
  const sym=G('bt-sym').value.trim().toUpperCase(),period=G('bt-period').value;
  if(!sym){alert('Sembol gir!');return;}
  G('bt-area').innerHTML=`<div style="text-align:center;padding:20px;color:#4b5e78">🔄 ${esc(sym)} backtest...</div>`;
  try{const d=await apiBacktest(sym,period);renderBacktest(d);}
  catch(e){G('bt-area').innerHTML=`<div style="text-align:center;padding:20px;color:#ef4444">✗ ${esc(e.message)}</div>`;}
}
function renderBacktest(d){
  if(d.hata||d.yeterli_veri===false){G('bt-area').innerHTML=`<div style="padding:16px;color:#ef4444">✗ ${esc(d.hata||'Yeterli veri yok')}</div>`;return;}
  let H=`<div class="card"><div class="ct">${esc(d.sembol)} · BACKTEST</div><div class="g2">`;
  const fields=[['Kalite Skoru',d.kalite_skoru],['Toplam Sinyal',d.toplam_sinyal],['Başarı %',d.basari_orani],['Ort. Getiri %',d.ort_getiri],['Max Drawdown',d.max_drawdown],['Sharpe',d.sharpe]];
  for(const [k,v] of fields){if(v==null)continue;H+=`<div class="gi"><span class="gl">${k}</span><span class="gv">${typeof v==='number'?v.toFixed(2):esc(String(v))}</span></div>`;}
  H+=`</div></div><pre style="background:#080c12;border-radius:4px;padding:8px;font-size:9px;overflow-x:auto;color:#7a9ab8;white-space:pre-wrap;word-break:break-all">${esc(JSON.stringify(d,null,2))}</pre>`;
  G('bt-area').innerHTML=H;
}
function sugPF(q){const b=G('psug');if(!q){b.style.display='none';return;}q=q.toUpperCase();const m=STOCKS.filter(r=>(r.sembol||'').indexOf(q)>=0).slice(0,10);if(!m.length){b.style.display='none';return;}b.style.display='block';b.innerHTML=m.map(r=>`<div style="padding:7px 10px;cursor:pointer;font-size:11px;border-bottom:1px solid #0f1520;color:#fff" onclick="selPF('${esc(r.sembol)}')"><b>${esc(r.sembol)}</b></div>`).join('');}
function selPF(s){PFS=s;G('plbl').textContent='✓ '+s;G('psug').style.display='none';G('psi').value=s;}
function pfAdd(){if(!PFS){alert('Hisse seç!');return;}if(PF.some(p=>p.sym===PFS)){alert('Zaten portföyde!');return;}PF.push({id:Date.now(),sym:PFS});saveStore();renderPortfolio();}
function pfRem(){if(!PFS){alert('Hisse seç!');return;}PF=PF.filter(p=>p.sym!==PFS);PFS='';G('plbl').textContent='— seçilmedi';G('psi').value='';saveStore();renderPortfolio();}
function pfDel(id){PF=PF.filter(p=>p.id!==id);saveStore();renderPortfolio();}
function renderPortfolio(){
  const el=G('plist');if(!el)return;
  if(!PF.length){el.innerHTML='<div style="padding:16px;font-size:12px;color:#2a3548;text-align:center">Portföy boş.</div>';return;}
  let H='';
  for(const p of PF){
    const r=STOCKS.find(x=>x.sembol===p.sym)||{};
    const nvs=r.nvs,nl=nvsLabel(nvs),cs=r.guven_skoru||0,chg=r.gunluk_degisim;
    const cs2=chg!=null?(chg>=0?'+':'')+chg.toFixed(2)+'%':'—';
    const cc=chg!=null?(chg>0?'#22c55e':chg<0?'#ef4444':'#94a3b8'):'#2a3548';
    H+=`<div style="padding:10px 12px;border-bottom:1px solid #0f1520;display:flex;align-items:center;justify-content:space-between"><div style="flex:1"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:3px"><span onclick="openDetail('${esc(p.sym)}')" style="font-size:15px;font-weight:700;color:#e8b84b;cursor:pointer">${esc(p.sym)}</span><span style="font-size:11px;font-weight:700;padding:2px 6px;background:${nl.bg};color:${nl.c};border-radius:3px">NVS ${nvs!=null?nvs:'—'}</span><span style="font-size:11px;font-weight:700;color:${cc}">${cs2}</span></div><div style="font-size:9px;color:#4b5e78">GS ${Math.round(cs)}% · BKM ${r.bkm||'—'}</div></div><button onclick="pfDel(${p.id})" style="background:#300;border:none;color:#f44;cursor:pointer;border-radius:3px;padding:3px 10px;font-size:11px">X</button></div>`;
  }
  el.innerHTML=H;
}
setInterval(()=>{const e=G('clk');if(e)e.textContent=new Date().toLocaleTimeString('tr-TR');},1000);
setInterval(()=>refresh(false),5*60*1000);
loadStore();refresh(false);
