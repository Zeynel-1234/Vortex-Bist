<script>
/* ═══════════════════════════════════════════════════════════════
   BIST VORTEX v7.3 · NİHAİ VORTEX SKORU (NVS)
   ───────────────────────────────────────────────────────────────
   NVS = Tek bir 0–100 sayı ile "AL mı SAT mı?" sorusuna cevap.

   NVS MATEMATİĞİ:
   NVS = (A × 0.40) + (B × 0.25) + (C × 0.20) + (D × 0.15)
   A = BKM skoru (3 zaman dilimi sentezi)
   B = Güven Skoru × 100 (indikatör uyum oranı)
   C = Günlük baz skor (adaptif ağırlıklı)
   D = Makro filtre skoru (aylık trend kalitesi)

   ANORMALY GUARD: Herhangi bir girdi NaN/null ise 50 (nötr)
   WEIGHT ANOMALY: Adaptif çarpan [0.2, 3.0] bandı zorlanır

   KARAR EŞİKLERİ:
   NVS ≥ 80 → GÜÇLÜ AL   (Tüm katmanlar senkron)
   NVS ≥ 65 → AL         (Çoğunluk pozitif)
   NVS ≥ 45 → NÖTR       (Bekleme)
   NVS ≥ 30 → SAT        (Zayıflama)
   NVS < 30 → GÜÇLÜ SAT  (Kaç)
   ═══════════════════════════════════════════════════════════════ */

/* ── GLOBAL DEĞİŞKENLER ──────────────────────────────────────── */
var SL=[],NM={},CH={},PR={};
var d_rec={},d_rsi={},d_stochK={},d_macdH={},d_ema20={},d_ema50={},d_ema200={};
var d_atr={},d_adx={},d_vol={},d_volAvg={};
var w_rec={},w_rsi={},w_stochK={},w_macdH={},w_ema20={},w_ema50={};
var m_rec={},m_rsi={},m_stochK={},m_macdH={},m_ema20={},m_ema50={};
var mTrend={};
var VD={},VW={},VM={},VC={},CSM={},NVS={}; /* NVS yeni */
var TF='C',SD=true,PF=[],PFS='',FTIME='';
var doneD=false,doneW=false,doneM=false;
var REPSYM='',REPTF='';
var FLTMODE=false;
var TAKIPLIST={};

/* ── DNA ENGINE DEĞİŞKENLERİ ─────────────────────────────────── */
var K_SIG='bvx73_sig',K_WTS='bvx73_wts',K_DNA='bvx73_dna',K_CHMP='bvx73_chmp',K_TK='bvx73_tk';
var SIGLOG={},AWTS={},STDNA={},CHAMP={},LEARN_BUSY=false;
var IK=['rec','rsi','stoch','macd','ema20','ema50','ema200','vol','adx'];
var DNA_DEF={
  MOM:{n:'Momentum',c:'#e8b84b',bg:'#2d1a00',d:'RSI+MACD+Stoch dominant'},
  TRD:{n:'Trend',c:'#22c55e',bg:'#022d10',d:'EMA 20/50/200 dominant'},
  VOL:{n:'Hacim',c:'#00d4ff',bg:'#001f2d',d:'Hacim+ADX dominant'},
  MIX:{n:'Karisik',c:'#94a3b8',bg:'#1e1e2e',d:'Dengeli sinyal yapisi'}
};

setInterval(function(){var e=document.getElementById('clk');if(e)e.textContent=new Date().toLocaleTimeString('tr-TR');},1000);
function G(id){return document.getElementById(id);}

/* ── VERİ YÜKLEME/KAYDETME ───────────────────────────────────── */
function loadAll(){
  function lj(k,d){try{var j=localStorage.getItem(k);return j?JSON.parse(j):d;}catch(e){return d;}}
  SIGLOG=lj(K_SIG,{});AWTS=lj(K_WTS,{});STDNA=lj(K_DNA,{});CHAMP=lj(K_CHMP,{});
  TAKIPLIST=lj(K_TK,{});PF=lj('bvx73_pf',[]);
}
function saveAll(){
  function sj(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
  sj(K_SIG,SIGLOG);sj(K_WTS,AWTS);sj(K_DNA,STDNA);sj(K_CHMP,CHAMP);sj(K_TK,TAKIPLIST);sj('bvx73_pf',PF);
}

/* ── GUARD: Güvenli sayı — null/NaN → varsayılan ────────────── */
function safe(v,def){return(v==null||isNaN(v))?def:v;}

/* ── WEIGHT ANOMALY GUARD ────────────────────────────────────── */
function clampWM(w){
  var out={};
  IK.forEach(function(k){out[k]=Math.max(0.2,Math.min(3.0,safe(w[k],1.0)));});
  return out;
}
function getWM(sym){
  var w=AWTS[sym];
  if(w&&w.gen>0)return clampWM(w);
  return{rec:1,rsi:1,stoch:1,macd:1,ema20:1,ema50:1,ema200:1,vol:1,adx:1};
}

/* ════════════════════════════════════════════════════════════════
   A — GÜNLÜK BAZ SKOR (Adaptif ağırlıklı, 0–100)
   Katkılar maksimum: rec×25 + rsi×20 + stoch×12 + macd×7
   + ema20×6 + ema50×4 + ema200×3 + vol×5 + adx×3 = 85p üzeri
   ════════════════════════════════════════════════════════════════ */
function adaptiveBaseScore(sym,rec,rsi,stoch,mh,e20,e50,e200,vol,va,adx){
  var wm=getWM(sym);
  var s=50;
  if(rec!=null&&!isNaN(rec))     s+=safe(rec,0)*25*wm.rec;
  if(rsi!=null&&!isNaN(rsi))     s+=(50-safe(rsi,50))/50*20*wm.rsi;
  if(stoch!=null&&!isNaN(stoch)) s+=(50-safe(stoch,50))/50*12*wm.stoch;
  if(mh!=null&&!isNaN(mh))       s+=(mh>0?7:-7)*wm.macd;
  if(e20!=null&&!isNaN(e20))     s+=(e20>0?6:-6)*wm.ema20;
  if(e50!=null&&!isNaN(e50))     s+=(e50>0?4:-4)*wm.ema50;
  if(e200!=null&&!isNaN(e200))   s+=(e200>0?3:-3)*wm.ema200;
  if(vol!=null&&va!=null&&va>0){
    var vr=vol/va;
    if(vr>2.5)s+=5*wm.vol;else if(vr>1.8)s+=3*wm.vol;else if(vr<0.6)s-=4*wm.vol;
  }
  if(adx!=null&&!isNaN(adx)&&adx>20&&rec!=null)
    s+=(rec>0?1:-1)*(adx>30?3:1)*wm.adx;
  return Math.max(0,Math.min(100,Math.round(s)));
}

/* ════════════════════════════════════════════════════════════════
   B — GÜVEN SKORU (0–1 → ×100)
   CS = I_uyum × H_dogr + OT
   I_uyum = indikatör oy oranı (bull/bear yönde kaç % uyuyor)
   H_dogr = 0.62 (tarihi doğruluk sabiti)
   OT = Oyun Teorisi düzeltmesi (hacim+RSI aykırısı)
   ════════════════════════════════════════════════════════════════ */
function calcCS(sym){
  var bull=(safe(VD[sym],50))>50;
  var rsi=d_rsi[sym],stoch=d_stochK[sym],mh=d_macdH[sym];
  var e20=d_ema20[sym],e50=d_ema50[sym],e200=d_ema200[sym];
  var rec=d_rec[sym],vol=d_vol[sym],va=d_volAvg[sym],adx=d_adx[sym];
  var votes=0,total=0;
  if(rsi!=null){total++;if(bull?rsi<50:rsi>55)votes++;}
  if(stoch!=null){total++;if(bull?stoch<55:stoch>65)votes++;}
  if(mh!=null){total++;if(bull?mh>0:mh<0)votes++;}
  if(e20!=null){total++;if(bull?e20>0:e20<0)votes++;}
  if(e50!=null){total++;if(bull?e50>0:e50<0)votes++;}
  if(e200!=null){total++;if(bull?e200>0:e200<0)votes++;}
  if(rec!=null){total++;if(bull?rec>0:rec<0)votes++;}
  if(adx!=null){total++;if(adx>20)votes++;}
  var Iu=total>0?votes/total:0.5;
  if(e200!=null&&e200<0&&bull)Iu*=0.7; /* Bear market cezası */
  var OT=0;
  if(vol!=null&&va!=null&&va>0){
    var vr2=vol/va;
    if(vr2>1.8&&rsi!=null&&rsi<45)OT=0.15;
    else if(vr2<0.6&&rsi!=null&&rsi>60)OT=-0.20;
    else if(vr2>1.5)OT=0.08;
  }
  return Math.max(0,Math.min(1,Iu*0.62+OT));
}

/* ════════════════════════════════════════════════════════════════
   C — BİLİŞİK KARAR MATRİSİ / BKM (0–100)
   3 zaman diliminin çarpımsal sentezi:
   raw = Dn × W_amp × M_gate
   Dn = günlük normalize skor, W_amp = haftalık amplifikatör
   M_gate = aylık kapı (Mn>0 → büyütür, Mn<0 → küçültür)
   ════════════════════════════════════════════════════════════════ */
function compScore(sym){
  var D=safe(VD[sym],50),W=safe(VW[sym],50),M=safe(VM[sym],50);
  var Dn=(D-50)/50,Wn=(W-50)/50,Mn=(M-50)/50;
  var Mg=Mn>0?1+Mn*0.40:1+Mn*0.60;
  var Wa=Dn*Wn>0?1+Math.abs(Wn)*0.35:1-Math.abs(Wn)*0.25;
  var raw=Dn*Wa*Mg;
  if(Math.abs(raw)>0.5)raw=raw*(1+Math.abs(raw)*0.30);
  var b=0;
  var rsi=d_rsi[sym],mh=d_macdH[sym],vol=d_vol[sym],va=d_volAvg[sym];
  var e20=d_ema20[sym],e50=d_ema50[sym],e200=d_ema200[sym];
  if(rsi!=null&&mh!=null){if(rsi<40&&mh>0)b+=0.08;if(rsi>65&&mh<0)b-=0.08;}
  if(vol!=null&&va!=null&&va>0){
    var vr3=vol/va;
    if(raw>0.3&&vr3>1.8)b+=0.06;
    if(raw>0&&vr3<0.6)b-=0.10;
  }
  if(e20!=null&&e50!=null&&e200!=null){
    if(e20>0&&e50>0&&e200>0)b+=0.06;
    else if(e20<0&&e50<0&&e200<0)b-=0.06;
  }
  if(d_adx[sym]!=null&&d_adx[sym]>28&&d_rec[sym]!=null)
    b+=(d_rec[sym]>0?1:-1)*0.04;
  return Math.max(0,Math.min(100,Math.round((raw+b)*50+50)));
}

/* ════════════════════════════════════════════════════════════════
   D — MAKRO FİLTRE SKORU (0–100)
   Aylık RSI + EMA trend uyumu + MACD yönü
   ════════════════════════════════════════════════════════════════ */
function macroScore(sym){
  var s=50;
  var mr=m_rsi[sym],mm=m_macdH[sym],mrec=m_rec[sym];
  var we=w_ema20[sym],we2=w_ema50[sym];
  if(mr!=null)s+=(50-mr)/50*25;
  if(mm!=null)s+=mm>0?12:-12;
  if(mrec!=null)s+=mrec*20;
  if(we!=null&&we2!=null)s+=(we>we2?8:-8);
  return Math.max(0,Math.min(100,Math.round(s)));
}

/* ════════════════════════════════════════════════════════════════
   NVS — NİHAİ VORTEX SKORU
   Formül: NVS = A×0.40 + B×0.25 + C×0.20 + D×0.15
   A=BKM, B=CS×100, C=GünlükBaz, D=Makro
   Anomali Koruması: NaN → 50, sınır dışı → klamp
   ════════════════════════════════════════════════════════════════ */
function calcNVS(sym){
  var A=safe(VC[sym],50);   /* BKM */
  var B=safe(CSM[sym],0.5)*100; /* Güven Skoru ×100 */
  var C=safe(VD[sym],50);   /* Günlük Baz */
  var D=macroScore(sym);    /* Makro */
  /* Anomali guard: hepsi 0-100 aralığında olmalı */
  A=Math.max(0,Math.min(100,A));
  B=Math.max(0,Math.min(100,B));
  C=Math.max(0,Math.min(100,C));
  D=Math.max(0,Math.min(100,D));
  var nvs=A*0.40+B*0.25+C*0.20+D*0.15;
  return Math.max(0,Math.min(100,Math.round(nvs)));
}

/* NVS etiket ve rengi */
function nvsLabel(n){
  if(n>=80)return{t:'GÜÇLÜ AL',c:'#22c55e',bg:'#052e16',emoji:'🟢'};
  if(n>=65)return{t:'AL',c:'#86efac',bg:'#022d10',emoji:'🟩'};
  if(n>=45)return{t:'NÖTR',c:'#94a3b8',bg:'#1e293b',emoji:'⬜'};
  if(n>=30)return{t:'SAT',c:'#fca5a5',bg:'#3b1010',emoji:'🟥'};
  return{t:'GÜÇLÜ SAT',c:'#ef4444',bg:'#450a0a',emoji:'🔴'};
}

/* ── 3 EN ÖNEMLİ GÖSTERGE (NVS'e en çok katkı yapanlar) ──────── */
function topFactors(sym){
  var factors=[];
  var wm=getWM(sym);
  var bull=(safe(VD[sym],50))>50;

  /* Her indikatörün NVS'e gerçek katkısını hesapla */
  var rec=d_rec[sym],rsi=d_rsi[sym],stoch=d_stochK[sym],mh=d_macdH[sym];
  var e20=d_ema20[sym],e50=d_ema50[sym],e200=d_ema200[sym];
  var vol=d_vol[sym],va=d_volAvg[sym],adx=d_adx[sym];

  if(rec!=null)factors.push({n:'TV Tavsiyesi',v:rec>0.3?1:rec<-0.3?-1:0,w:25*wm.rec,raw:rec.toFixed(2),unit:''});
  if(rsi!=null){var ri=(50-rsi)/50;factors.push({n:'RSI',v:ri>0.1?1:ri<-0.1?-1:0,w:20*wm.rsi,raw:rsi.toFixed(0),unit:''});}
  if(mh!=null)factors.push({n:'MACD Histogram',v:mh>0?1:-1,w:7*wm.macd,raw:mh.toFixed(4),unit:''});
  if(e20!=null)factors.push({n:'EMA20 Pozisyonu',v:e20>0?1:-1,w:6*wm.ema20,raw:e20>0?'Üst':'Alt',unit:''});
  if(e200!=null)factors.push({n:'EMA200 (Makro)',v:e200>0?1:-1,w:3*wm.ema200,raw:e200>0?'Üst':'Alt',unit:''});
  if(stoch!=null){var si=(50-stoch)/50;factors.push({n:'Stoch %K',v:si>0.15?1:si<-0.15?-1:0,w:12*wm.stoch,raw:stoch.toFixed(0),unit:''});}
  if(vol!=null&&va!=null&&va>0){var vr=vol/va;factors.push({n:'Hacim Oranı',v:vr>1.5?1:vr<0.7?-1:0,w:5,raw:vr.toFixed(1)+'×',unit:''});}
  if(adx!=null)factors.push({n:'ADX Güç',v:adx>25?1:0,w:3*wm.adx,raw:adx.toFixed(0),unit:''});

  /* Katkıyı hesapla: yön × ağırlık */
  factors.forEach(function(f){f.impact=f.v*f.w;});
  /* Mutlak etkiye göre sırala, ilk 3 al */
  factors.sort(function(a,b){return Math.abs(b.impact)-Math.abs(a.impact);});
  return factors.slice(0,3);
}

function calcScore(sym,tf){
  if(tf==='C')return compScore(sym);
  if(tf==='N')return calcNVS(sym);
  if(tf==='D')return adaptiveBaseScore(sym,d_rec[sym],d_rsi[sym],d_stochK[sym],d_macdH[sym],d_ema20[sym],d_ema50[sym],d_ema200[sym],d_vol[sym],d_volAvg[sym],d_adx[sym]);
  if(tf==='W')return adaptiveBaseScore(sym,w_rec[sym],w_rsi[sym],w_stochK[sym],w_macdH[sym],w_ema20[sym],w_ema50[sym],null,null,null,null);
  return adaptiveBaseScore(sym,m_rec[sym],m_rsi[sym],m_stochK[sym],m_macdH[sym],m_ema20[sym],m_ema50[sym],null,null,null,null);
}

function recompute(){
  for(var i=0;i<SL.length;i++){
    var s=SL[i];
    VD[s]=calcScore(s,'D');VW[s]=calcScore(s,'W');
    VM[s]=calcScore(s,'M');VC[s]=compScore(s);
    CSM[s]=calcCS(s);
    NVS[s]=calcNVS(s); /* Her yenilemede NVS hesapla */
  }
}

function getScore(sym){
  if(TF==='N')return NVS[sym];
  if(TF==='C')return VC[sym];

}

var TVS='https://scanner.tradingview.com/turkey/scan';
var PXS=[TVS,'https://corsproxy.io/?'+encodeURIComponent(TVS),'https://api.allorigins.win/raw?url='+encodeURIComponent(TVS),'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(TVS)];
function tvPost(body,ms,onOk,onFail){
  var pi=0;
  function nxt(){
    if(pi>=PXS.length){onFail('fail');return;}
    var url=PXS[pi++],done=false;
    var t=setTimeout(function(){if(!done){done=true;nxt();}},ms||9000);
    var x=new XMLHttpRequest();x.open('POST',url,true);x.setRequestHeader('Content-Type','text/plain');
    x.onload=function(){if(done)return;clearTimeout(t);done=true;
      if(x.status>=200&&x.status<300){try{var d=JSON.parse(x.responseText);if(d&&d.data&&d.data.length>0){onOk(d);return;}}catch(e){}}nxt();};
    x.onerror=function(){if(!done){clearTimeout(t);done=true;nxt();}};
    x.send(JSON.stringify(body));
  }nxt();
}

/* ── DNA ENGINE ──────────────────────────────────────────────── */
function logSignal(sym){
  var sc=safe(NVS[sym],0);
  if(sc<60||!PR[sym])return;
  if(!SIGLOG[sym])SIGLOG[sym]=[];
  var logs=SIGLOG[sym];
  var now=Date.now();
  if(logs.length>0&&(now-logs[logs.length-1].ts)<86400000)return;
  var bull={
    rec:d_rec[sym]!=null?(d_rec[sym]>0?1:0):null,
    rsi:d_rsi[sym]!=null?(d_rsi[sym]<50?1:0):null,
    stoch:d_stochK[sym]!=null?(d_stochK[sym]<55?1:0):null,
    macd:d_macdH[sym]!=null?(d_macdH[sym]>0?1:0):null,
    ema20:d_ema20[sym]!=null?(d_ema20[sym]>0?1:0):null,
    ema50:d_ema50[sym]!=null?(d_ema50[sym]>0?1:0):null,
    ema200:d_ema200[sym]!=null?(d_ema200[sym]>0?1:0):null,
    vol:(d_vol[sym]&&d_volAvg[sym]&&d_volAvg[sym]>0)?(d_vol[sym]/d_volAvg[sym]>1.5?1:0):null,
    adx:d_adx[sym]!=null?(d_adx[sym]>25?1:0):null
  };
  logs.push({ts:now,px:PR[sym],sc:sc,bull:bull,t5:null,t10:null,t21:null});
  if(logs.length>60)SIGLOG[sym]=logs.slice(-60);
}
function autoLogSignals(){
  var nNew=0;
  for(var i=0;i<SL.length;i++){
    var s=SL[i];if(safe(NVS[s],0)<60)continue;
    var prev=SIGLOG[s]?SIGLOG[s].length:0;
    logSignal(s);
    if(SIGLOG[s]&&SIGLOG[s].length>prev)nNew++;
  }
  if(nNew>0)saveAll();
  return nNew;
}
function countAllSigs(){var t=0;for(var s in SIGLOG)t+=SIGLOG[s].length;return t;}

function fetchYFHist(sym,cb){
  var yB='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'.IS?interval=1d&range=3mo';
  var proxies=['https://corsproxy.io/?'+encodeURIComponent(yB),'https://api.allorigins.win/raw?url='+encodeURIComponent(yB),yB];
  var pi=0;
  function tryNext(){
    if(pi>=proxies.length){cb(null);return;}
    var url=proxies[pi++],done=false;
    var t=setTimeout(function(){if(!done){done=true;tryNext();}},8000);
    var x=new XMLHttpRequest();x.open('GET',url,true);x.timeout=7000;
    x.onload=function(){
      if(done)return;clearTimeout(t);done=true;
      if(x.status>=200&&x.status<300){
        try{
          var d=JSON.parse(x.responseText),bars=[];
          if(d.chart&&d.chart.result&&d.chart.result[0]){
            var res=d.chart.result[0],q=res.indicators.quote[0];
            for(var i=0;i<res.timestamp.length;i++)if(q.close[i]!=null)bars.push({t:res.timestamp[i],c:q.close[i]});
            cb(bars);return;
          }
        }catch(e){}
      }tryNext();
    };
    x.onerror=function(){if(!done){clearTimeout(t);done=true;tryNext();}};
    x.send();
  }tryNext();
}
function getPxAt(bars,ts){
  var tsS=ts/1000;
  for(var i=0;i<bars.length;i++)if(bars[i].t>=tsS)return bars[i].c;
  return bars.length>0?bars[bars.length-1].c:null;
}

function validateSignals(onDone){
  if(LEARN_BUSY){if(onDone)onDone(0);return;}
  var now=Date.now(),DAY=86400000,needV=[];
  for(var sym in SIGLOG){
    var logs=SIGLOG[sym],has=false;
    for(var i=0;i<logs.length;i++){
      var sg=logs[i],age=now-sg.ts;
      if((sg.t5===null&&age>7*DAY)||(sg.t10===null&&age>14*DAY)||(sg.t21===null&&age>30*DAY)){has=true;break;}
    }
    if(has&&needV.indexOf(sym)<0)needV.push(sym);
  }
  if(!needV.length){if(onDone)onDone(0);return;}
  LEARN_BUSY=true;
  var validated=0,idx=0;
  function next(){
    if(idx>=needV.length){
      LEARN_BUSY=false;
      for(var s in SIGLOG)updateWeights(s);
      for(var s in AWTS)computeDNA(s);
      updateChampions();saveAll();
      if(onDone)onDone(validated);return;
    }
    var sym=needV[idx++];
    var lnStat=G('ln-stat');if(lnStat)lnStat.textContent='Doğrulanıyor: '+sym+' ('+idx+'/'+needV.length+')';
    fetchYFHist(sym,function(bars){
      if(bars&&bars.length>0){
        var logs=SIGLOG[sym]||[];
        for(var i=0;i<logs.length;i++){
          var sg=logs[i],age=now-sg.ts;
          if(sg.t5===null&&age>7*DAY){var px=getPxAt(bars,sg.ts+7*DAY);if(px!=null){sg.t5=(px-sg.px)/sg.px*100;validated++;}}
          if(sg.t10===null&&age>14*DAY){var px=getPxAt(bars,sg.ts+14*DAY);if(px!=null)sg.t10=(px-sg.px)/sg.px*100;}
          if(sg.t21===null&&age>30*DAY){var px=getPxAt(bars,sg.ts+30*DAY);if(px!=null)sg.t21=(px-sg.px)/sg.px*100;}
        }SIGLOG[sym]=logs;
      }
      setTimeout(next,300);
    });
  }next();
}

function updateWeights(sym){
  var logs=SIGLOG[sym]||[];
  var val=logs.filter(function(s){return s.t5!==null||s.t10!==null;});
  if(val.length<1)return;
  var hits={},total={};
  IK.forEach(function(k){hits[k]=0;total[k]=0;});
  for(var i=0;i<val.length;i++){
    var sg=val[i];
    var ret=sg.t5!==null?sg.t5:(sg.t10!==null?sg.t10:sg.t21);
    if(ret===null)continue;
    var success=ret>1.5;
    IK.forEach(function(k){
      if(sg.bull[k]===null||sg.bull[k]===undefined)return;
      total[k]++;
      if((sg.bull[k]===1&&success)||(sg.bull[k]===0&&!success))hits[k]++;
    });
  }
  var old=AWTS[sym]||{};
  var wm={};
  var gen=(old.gen||0)+1;
  IK.forEach(function(k){
    if(total[k]<1){wm[k]=safe(old[k],1.0);return;}
    var acc=hits[k]/total[k];
    var newM=Math.max(0.2,Math.min(3.0,1+2*(acc-0.5)));
    var oldM=safe(old[k],1.0);
    wm[k]=Math.max(0.2,Math.min(3.0,newM*0.70+oldM*0.30));
  });
  wm.gen=gen;wm.validated=val.length;
  var errs=0,errSum=0;
  for(var i=0;i<val.length;i++){
    var sg=val[i],ret=sg.t5!==null?sg.t5:sg.t10;
    if(ret===null)continue;
    var pred=sg.sc>80?1:sg.sc>65?0.5:0;
    var act=ret>3?1:ret>1.5?0.5:0;
    errSum+=(pred-act)*(pred-act);errs++;
  }
  wm.rmse=errs>0?Math.sqrt(errSum/errs).toFixed(3):null;
  AWTS[sym]=wm;
}

function computeDNA(sym){
  var wm=AWTS[sym];if(!wm||wm.gen<1){STDNA[sym]='MIX';return;}
  var mom=(safe(wm.rsi,1)+safe(wm.macd,1)+safe(wm.stoch,1))/3;
  var trd=(safe(wm.ema20,1)+safe(wm.ema50,1)+safe(wm.ema200,1))/3;
  var vol=(safe(wm.vol,1)+safe(wm.adx,1))/2;
  var maxV=Math.max(mom,trd,vol);
  if(maxV<1.3){STDNA[sym]='MIX';return;}
  if(mom>=trd&&mom>=vol)STDNA[sym]='MOM';
  else if(trd>=mom&&trd>=vol)STDNA[sym]='TRD';
  else STDNA[sym]='VOL';
}

function updateChampions(){
  Object.keys(DNA_DEF).forEach(function(cl){
    var stocks=Object.keys(STDNA).filter(function(s){return STDNA[s]===cl&&AWTS[s]&&AWTS[s].gen>=1;});
    if(!stocks.length)return;
    var bestSym=null,bestAcc=-1,bestN=0;
    stocks.forEach(function(sym){
      var logs=SIGLOG[sym]||[];
      var val=logs.filter(function(s){return s.t5!==null;});
      if(val.length<1)return;
      var acc=val.filter(function(s){return s.t5>1.5;}).length/val.length;
      if(acc>bestAcc){bestAcc=acc;bestSym=sym;bestN=stocks.length;}
    });
    if(bestSym)CHAMP[cl]={wts:AWTS[bestSym],acc:bestAcc,sym:bestSym,n:bestN};
  });
}

function runValidation(){
  var btn=G('val-btn');if(btn){btn.textContent='⏳ ...';btn.disabled=true;}
  var now=Date.now(),DAY=86400000,tooFresh=0,earliest=Infinity;
  for(var sym in SIGLOG){
    var logs=SIGLOG[sym];
    for(var i=0;i<logs.length;i++){
      var sg=logs[i];
      if(sg.t5===null&&(now-sg.ts)<=7*DAY){tooFresh++;var e=sg.ts+7*DAY;if(e<earliest)earliest=e;}
    }
  }
  var es=earliest<Infinity?new Date(earliest).toLocaleDateString('tr-TR'):'—';
  validateSignals(function(count){
    if(btn){
      btn.textContent=count>0?'✓ '+count+' val':'⏰ Erken';
      setTimeout(function(){btn.textContent='🔬 DOĞRULA';btn.disabled=false;},3000);
    }
    var ls=G('ln-stat');
    if(ls){
      if(count>0)ls.textContent='✓ '+count+' sinyal Yahoo Finance ile doğrulandı. Kalibrasyon güncellendi.';
      else ls.textContent='⏰ '+tooFresh+' sinyal bekliyor · İlk doğrulama: '+es;
    }
    recompute();renderLearn();
  });
}

/* SİMÜL: SADECE gerçek kayıtlardaki t5=null → anlık fiyat farkı */
function runSimulation(){
  var btn=G('sim-btn');if(!btn)return;
  btn.textContent='⏳ ...';btn.disabled=true;
  var simCount=0;
  for(var sym in SIGLOG){
    var logs=SIGLOG[sym],curPx=PR[sym];
    if(!curPx)continue;
    for(var j=0;j<logs.length;j++){
      var lg=logs[j];
      if(lg.t5===null&&lg.px!=null&&lg.px>0){
        lg.t5=(curPx-lg.px)/lg.px*100;simCount++;
      }
    }
  }
  if(simCount===0){
    btn.textContent='⚡ SİMÜL';btn.disabled=false;
    var ls=G('ln-stat');if(ls)ls.textContent='ℹ️ Tüm sinyaller zaten işlenmiş veya fiyat verisi yok.';
    return;
  }
  for(var s in SIGLOG)updateWeights(s);
  for(var s in AWTS)computeDNA(s);
  updateChampions();saveAll();
  btn.textContent='✓ '+simCount;
  setTimeout(function(){btn.textContent='⚡ SİMÜL';btn.disabled=false;},3000);
  var ls=G('ln-stat');
  if(ls)ls.textContent='⚡ '+simCount+' sinyal: kayıt→anlık fiyat işlendi. '+Object.keys(AWTS).length+' hisse kalibre.';
  recompute();buildWL(G('srch')?G('srch').value:'');renderF();renderLearn();
}

function emaCalc(arr,p){var k=2/(p+1),r=[arr[0]];for(var i=1;i<arr.length;i++)r.push(arr[i]*k+r[r.length-1]*(1-k));return r;}
function rsiCalc(cls){
  var ag=0,al=0,r=[50];
  for(var i=1;i<Math.min(15,cls.length);i++){var d=cls[i]-cls[i-1];if(d>0)ag+=d;else al-=d;}
  ag/=14;al/=14;
  for(var i=14;i<cls.length;i++){
    var d=cls[i]-cls[i-1];
    if(d>0){ag=(ag*13+d)/14;al=(al*13)/14;}else{ag=(ag*13)/14;al=(al*13-d)/14;}
    r.push(al>0?100-100/(1+ag/al):100);
  }return r;
}
function stochCalc(H,L,C,k){
  if(!k)k=14;var r=[];
  for(var i=k-1;i<C.length;i++){
    var hh=H[i],ll=L[i];
    for(var j=i-k+1;j<i;j++){if(H[j]>hh)hh=H[j];if(L[j]<ll)ll=L[j];}
    r.push(hh===ll?50:(C[i]-ll)/(hh-ll)*100);
  }return r;
}
function macdCalc(cls){
  var e12=emaCalc(cls,12),e26=emaCalc(cls,26);
  var mn=Math.min(e12.length,e26.length),ml=[];
  for(var i=0;i<mn;i++)ml.push(e12[e12.length-mn+i]-e26[i]);
  var sg=emaCalc(ml,9),h=[];
  for(var i=0;i<sg.length;i++)h.push(ml[ml.length-sg.length+i]-sg[i]);
  return h;
}
function btCS(rsi,mh,e20,e50,e200p,vr,stoch){
  var bull=rsi<50&&mh>0;var votes=0,total=0;
  if(rsi!=null){total++;if(bull?rsi<50:rsi>55)votes++;}
  if(mh!=null){total++;if(mh>0)votes++;}
  if(e20!=null){total++;if(e20>0)votes++;}
  if(e50!=null){total++;if(e50>0)votes++;}
  if(stoch!=null){total++;if(stoch<55)votes++;}

  var OT=vr>1.8&&rsi<45?0.15:vr<0.6&&rsi>60?-0.20:vr>1.5?0.08:0;
  return Math.min(1,Math.max(0,Iu*0.62+OT));

function parseBars(data,stat){

    ts=data.timestamps||data.t;cls=data.close||data.c;

  } else if(data.chart&&data.chart.result&&data.chart.result[0]){

function runBacktest(){
  var symIn=G('bt-sym'),perIn=G('bt-period'),holdIn=G('bt-hold'),algoIn=G('bt-algo');
  var sym=symIn?symIn.value.toUpperCase().trim():'THYAO';
  var per=perIn?perIn.value:'2y';var hold=holdIn?parseInt(holdIn.value):15;
  var algo=algoIn?algoIn.value:'omega';
  var stat=G('bt-stat'),area=G('bt-area');
  if(stat)stat.textContent='Veri indiriliyor: '+sym+'.IS ['+algo.toUpperCase()+']...';
  if(area)area.innerHTML='<div style="padding:16px;text-align:center;color:#4b5e78">Hesaplanıyor...</div>';
  var yB='https://query1.finance.yahoo.com/v8/finance/chart/'+sym+'.IS?interval=1d&range='+per;
  var yB2='https://query2.finance.yahoo.com/v8/finance/chart/'+sym+'.IS?interval=1d&range='+per;
  var proxies=['https://vortex-bist-production-c3bc.up.railway.app/api/'+sym+'?tf=1d&range='+per,'https://corsproxy.io/?'+encodeURIComponent(yB),'https://api.allorigins.win/raw?url='+encodeURIComponent(yB),yB2,yB];
  var pi=0;
  function tryNext(){
    if(pi>=proxies.length){if(stat)stat.textContent='Veri alınamadı.';if(area)area.innerHTML='<div style="padding:16px;text-align:center;color:#ef4444">Tüm proxy başarısız.</div>';return;}
    var url=proxies[pi++],done=false;
    var t=setTimeout(function(){if(!done){done=true;tryNext();}},12000);
    var x=new XMLHttpRequest();x.open('GET',url,true);x.timeout=11000;
    x.onload=function(){if(done)return;clearTimeout(t);done=true;
      if(x.status>=200&&x.status<300){
        try{var parsed=JSON.parse(x.responseText);
          if(algo==='omega')procDataOmega(parsed,sym,hold,stat,area);
          else procDataAnayas(parsed,sym,hold,stat,area);
          return;}catch(e){}
      }tryNext();};
    x.onerror=function(){if(!done){clearTimeout(t);done=true;tryNext();}};
    x.ontimeout=function(){if(!done){done=true;tryNext();}};
    x.send();
  }tryNext();
}
